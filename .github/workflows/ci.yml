name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libevent-dev
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libevent || true
      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libevent:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Build all targets
        run: cargo build --all-targets
      - name: Run tests
        run: cargo test
      - name: Run smoke tests
        run: cargo test --test smoke

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libevent-dev
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Generate coverage
        # system 测试包含 100K 插入，在覆盖率插桩下较慢，此处排除以控制 CI 时长。
        run: cargo llvm-cov --lib --tests --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
