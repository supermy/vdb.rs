name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libevent-dev
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libevent || true
      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libevent:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Build all targets
        run: cargo build --all-targets
      - name: Run tests
        run: cargo test
      - name: Run smoke tests
        run: cargo test --test smoke

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libevent-dev
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Generate coverage
        # system 测试包含 100K 插入，在覆盖率插桩下较慢，此处排除以控制 CI 时长。
        run: cargo llvm-cov --lib --tests --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  release:
    name: Release Build
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libevent-dev
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libevent || true
      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install libevent:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release --bins
      - name: Package binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist
          cp target/release/vdb target/release/vdb-server target/release/vdb-nng-server target/release/vdb-benchmark dist/
          tar czvf "vdb-${VERSION}-${{ matrix.target }}.${{ matrix.archive }}" -C dist .
      - name: Package binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          $version = $env:GITHUB_REF_NAME
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/vdb.exe, target/release/vdb-server.exe, target/release/vdb-nng-server.exe, target/release/vdb-benchmark.exe dist/
          Compress-Archive -Path dist/* -DestinationPath "vdb-${version}-${{ matrix.target }}.zip" -Force
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: vdb-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
